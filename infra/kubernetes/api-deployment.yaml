apiVersion: apps/v1
kind: Deployment
metadata:
  name: bps-api
  namespace: barberprosuite
  labels:
    app: bps-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: bps-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: bps-api
    spec:
      containers:
        - name: api
          image: barberprosuite/api:latest
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: bps-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 10"]
      terminationGracePeriodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: bps-api-service
  namespace: barberprosuite
spec:
  selector:
    app: bps-api
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: bps-api-hpa
  namespace: barberprosuite
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: bps-api
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
