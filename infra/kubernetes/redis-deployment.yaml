apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: bps-redis
  namespace: barberprosuite
spec:
  serviceName: bps-redis
  replicas: 1
  selector:
    matchLabels:
      app: bps-redis
  template:
    metadata:
      labels:
        app: bps-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          command:
            - redis-server
            - --appendonly
            - "yes"
            - --maxmemory
            - 512mb
            - --maxmemory-policy
            - allkeys-lru
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: redis-data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi

---
apiVersion: v1
kind: Service
metadata:
  name: bps-redis
  namespace: barberprosuite
spec:
  selector:
    app: bps-redis
  ports:
    - port: 6379
      targetPort: 6379
  clusterIP: None
