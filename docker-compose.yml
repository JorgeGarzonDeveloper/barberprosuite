version: "3.9"

# ============================================================
# BarberProSuite - Docker Compose (Desarrollo)
# ============================================================

services:
  # --- Base de datos principal ---
  postgres:
    image: postgres:16-alpine
    container_name: bps_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: barberprosuite
      POSTGRES_USER: barber_user
      POSTGRES_PASSWORD: barber_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U barber_user -d barberprosuite"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Redis (cola virtual, cache, sesiones) ---
  redis:
    image: redis:7-alpine
    container_name: bps_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ""
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # --- API Backend (NestJS) ---
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.dev
    container_name: bps_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://barber_user:barber_pass@postgres:5432/barberprosuite
      REDIS_URL: redis://redis:6379
    volumes:
      - ./apps/api:/app
      - /app/node_modules
    ports:
      - "3000:3000"
      - "3001:3001"  # WebSocket
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: pnpm run start:dev

  # --- Web Frontend (Next.js) ---
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile.dev
    container_name: bps_web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3000
      NEXT_PUBLIC_WS_URL: ws://localhost:3001
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3002:3002"
    depends_on:
      - api
    command: pnpm run dev

  # --- Nginx (Reverse proxy) ---
  nginx:
    image: nginx:alpine
    container_name: bps_nginx
    restart: unless-stopped
    volumes:
      - ./infra/nginx/nginx.dev.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - api
      - web

  # --- Redis Insight (UI para Redis en dev) ---
  redis-insight:
    image: redislabs/redisinsight:latest
    container_name: bps_redis_insight
    restart: unless-stopped
    ports:
      - "8001:8001"
    profiles:
      - tools

  # --- Adminer (UI para PostgreSQL en dev) ---
  adminer:
    image: adminer:latest
    container_name: bps_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    profiles:
      - tools

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  default:
    name: barberprosuite_network
